<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Vyoma — Slide Explanation</title>
<style>
  :root {
    --blue-deep: #0d3d78;
    --blue: #1a6fc4;
    --blue-light: #4a9ae8;
    --ink: #0c1420;
    --glass-bg: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.35);
    --glass-shadow: rgba(8, 20, 40, 0.35);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 30% 20%, var(--blue-light) 0%, var(--blue) 35%, var(--blue-deep) 75%, var(--ink) 100%);
  }

  .stage {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 18px;
  }

  .slide-frame {
    max-width: 100%; max-height: calc(100% - 110px);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(4, 12, 28, 0.55), 0 2px 8px rgba(4,12,28,0.4);
    border: 1px solid rgba(255,255,255,0.25);
  }
  .slide-frame img { display: block; width: 100%; height: 100%; object-fit: contain; background: #fff; }

  /* ---------- Glassmorphism control bar ---------- */
  .player {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px;
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.4);
    max-width: 92vw;
  }

  .ctrl-btn {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer; flex-shrink: 0;
    transition: background .15s ease, transform .1s ease;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.32); }
  .ctrl-btn:active { transform: scale(0.94); }
  .ctrl-btn svg { width: 20px; height: 20px; fill: #ffffff; }

  .track {
    display: flex; flex-direction: column; gap: 5px; min-width: 140px;
  }
  .label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.03em; color: #ffffff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
  .progress-wrap {
    width: 100%; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.25);
    overflow: hidden; cursor: pointer;
  }
  .progress-fill { height: 100%; width: 0%; background: #ffffff; border-radius: 3px; }

  .speed-btn {
    display: flex; align-items: center; justify-content: center;
    min-width: 46px; height: 44px; padding: 0 10px; border-radius: 999px;
    background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.4);
    color: #ffffff; font-size: 12.5px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    transition: background .15s ease, transform .1s ease;
  }
  .speed-btn:hover { background: rgba(255,255,255,0.32); }
  .speed-btn:active { transform: scale(0.94); }

  .tap-overlay {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(6, 16, 32, 0.55); backdrop-filter: blur(4px);
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; z-index: 10;
  }
  .tap-overlay.show { display: flex; }
  .tap-inner {
    background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px;
    padding: 26px 32px; backdrop-filter: blur(18px);
  }
  .tap-inner svg { width: 34px; height: 34px; fill: #fff; margin-bottom: 8px; }
</style>
</head>
<body>

  <div class="stage">
    <div class="slide-frame">
      <img id="slideImg" alt="Slide">
    </div>
  </div>

  <div class="player">
    <div class="ctrl-btn" id="playBtn">
      <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </div>
    <div class="track">
      <div class="label" id="slideLabel">Team Vyoma</div>
      <div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="speed-btn" id="speedBtn">1x</div>
  </div>

  <div class="tap-overlay" id="tapOverlay">
    <div class="tap-inner">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <div>Tap to play</div>
    </div>
  </div>

  <audio id="audio" preload="auto"></audio>

<script>
  const SLIDES = {
    1: { audio: "media/team_vyoma_slide1_explanation.mp3", img: "media/slide_images/slide1.png" },
    2: { audio: "media/team_vyoma_slide2_explanation.ogg", img: "media/slide_images/slide2.png" },
    3: { audio: "media/team_vyoma_slide3_explanation.ogg", img: "media/slide_images/slide3.png" },
    4: { audio: "media/team_vyoma_slide4_explanation.ogg", img: "media/slide_images/slide4.png" },
    5: { audio: "media/team_vyoma_slide5_explanation.mp3", img: "media/slide_images/slide5.png" },
    6: { audio: "media/team_vyoma_slide6_explanation.ogg", img: "media/slide_images/slide6.png" },
    7: { audio: "media/team_vyoma_slide7_explanation.ogg", img: "media/slide_images/slide7.png" },
    8: { audio: "media/team_vyoma_slide8_explanation.ogg", img: "media/slide_images/slide8.png" },
    9: { audio: "media/team_vyoma_slide9_explanation.ogg", img: "media/slide_images/slide9.png" },
  };

  const params = new URLSearchParams(window.location.search);
  const slideNum = parseInt(params.get("slide") || "1", 10);
  const cfg = SLIDES[slideNum] || SLIDES[1];

  document.getElementById("slideImg").src = cfg.img;
  document.getElementById("slideLabel").textContent = "Team Vyoma — Slide " + slideNum;

  const audio = document.getElementById("audio");
  audio.src = cfg.audio;

  const playBtn = document.getElementById("playBtn");
  const playIcon = document.getElementById("playIcon");
  const pauseIcon = document.getElementById("pauseIcon");
  const speedBtn = document.getElementById("speedBtn");
  const progressFill = document.getElementById("progressFill");
  const progressWrap = document.getElementById("progressWrap");
  const tapOverlay = document.getElementById("tapOverlay");

  const SPEEDS = [1, 1.25, 1.5, 2];
  let speedIdx = 0;

  function setPlayingUI(playing) {
    playIcon.style.display = playing ? "none" : "block";
    pauseIcon.style.display = playing ? "block" : "none";
  }

  function tryAutoplay() {
    const p = audio.play();
    if (p !== undefined) {
      p.then(() => setPlayingUI(true)).catch(() => {
        tapOverlay.classList.add("show");
        setPlayingUI(false);
      });
    }
  }

  window.addEventListener("load", tryAutoplay);

  playBtn.addEventListener("click", () => {
    if (audio.paused) { audio.play(); setPlayingUI(true); }
    else { audio.pause(); setPlayingUI(false); }
  });

  tapOverlay.addEventListener("click", () => {
    audio.play().then(() => { setPlayingUI(true); tapOverlay.classList.remove("show"); });
  });

  speedBtn.addEventListener("click", () => {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    audio.playbackRate = SPEEDS[speedIdx];
    speedBtn.textContent = SPEEDS[speedIdx] + "x";
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration) progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
  });
  audio.addEventListener("ended", () => setPlayingUI(false));

  progressWrap.addEventListener("click", (e) => {
    const rect = progressWrap.getBoundingClientRect();
    const frac = (e.clientX - rect.left) / rect.width;
    if (audio.duration) audio.currentTime = frac * audio.duration;
  });
</script>
</body>
</html>
